<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>LangChain4j + DashScope 测试</title>
    <style>
        :root { color-scheme: light dark; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; margin: 24px; }
        .wrap { max-width: 900px; margin: 0 auto; }
        h1 { margin: 0 0 12px; font-size: 20px; }
        .card { border: 1px solid rgba(127,127,127,0.35); border-radius: 12px; padding: 16px; }
        label { display: block; font-size: 13px; opacity: 0.85; margin: 12px 0 6px; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(127,127,127,0.35); background: transparent; }
        textarea { min-height: 120px; resize: vertical; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .actions { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
        button { padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(127,127,127,0.35); background: rgba(127,127,127,0.12); cursor: pointer; }
        button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        pre { white-space: pre-wrap; word-break: break-word; background: rgba(127,127,127,0.08); padding: 12px; border-radius: 10px; border: 1px solid rgba(127,127,127,0.2); }
        .hint { font-size: 12px; opacity: 0.75; margin-top: 10px; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>LangChain4j + DashScope（Qwen）测试页</h1>

    <div class="card">
        <div class="row">
            <div>
                <label for="baseUrl">后端地址（Base URL）</label>
                <input id="baseUrl" value="http://localhost:8090" />
            </div>
            <div>
                <label for="endpoint">接口路径</label>
                <input id="endpoint" value="/api/chat" />
            </div>
        </div>

        <label for="message">输入（message）</label>
        <textarea id="message" placeholder="例如：请用 3 点总结 RAG 的关键要素。"></textarea>

        <div class="actions">
            <button class="primary" id="sendBtn">发送</button>
            <button id="clearBtn">清空</button>
            <span id="status" class="hint"></span>
        </div>

        <label>响应（output）</label>
        <pre id="output">(等待请求...)</pre>

        <div class="hint">
            说明：此页面会 POST JSON：<code>{"message": "..."}</code> 到 <code>{baseUrl}{endpoint}</code>。<br/>
            若你改了端口，请同步修改 Base URL（默认你项目端口是 8089）。
        </div>
    </div>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    const baseUrlEl = $("baseUrl");
    const endpointEl = $("endpoint");
    const messageEl = $("message");
    const sendBtn = $("sendBtn");
    const clearBtn = $("clearBtn");
    const outputEl = $("output");
    const statusEl = $("status");

    function setStatus(text, isError=false) {
        statusEl.textContent = text || "";
        statusEl.className = "hint" + (isError ? " error" : "");
    }

    alert("clicked");
    async function send() {
        const baseUrl = baseUrlEl.value.trim().replace(/\/+$/, "");
        const endpoint = endpointEl.value.trim().startsWith("/") ? endpointEl.value.trim() : ("/" + endpointEl.value.trim());
        const message = messageEl.value;

        if (!message.trim()) {
            setStatus("请输入 message", true);
            return;
        }

        const url = baseUrl + endpoint;

        sendBtn.disabled = true;
        setStatus("请求中…");
        outputEl.textContent = "";

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const text = await res.text();
            if (!res.ok) {
                setStatus(`请求失败：HTTP ${res.status}`, true);
                outputEl.textContent = text;
                return;
            }

            // 尝试解析 JSON（你的后端返回 ChatResponse）
            try {
                const json = JSON.parse(text);
                outputEl.textContent = json.output ?? JSON.stringify(json, null, 2);
            } catch (e) {
                // 兜底：如果后端不是 JSON
                outputEl.textContent = text;
            }

            setStatus("完成");
        } catch (e) {
            setStatus("请求异常（可能是跨域/CORS 或服务未启动）", true);
            outputEl.textContent = String(e);
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.addEventListener("click", send);
    clearBtn.addEventListener("click", () => {
        messageEl.value = "";
        outputEl.textContent = "(等待请求...)";
        setStatus("");
    });

    // Ctrl/Cmd + Enter 发送
    messageEl.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") send();
    });
</script>
</body>
</html>
