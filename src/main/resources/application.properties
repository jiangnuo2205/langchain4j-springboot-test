spring.application.name=springboot-langchain4j-dashscope
server.port=8090

# ── Provider selection ──────────────────────────────────────────────────────
# llm.provider:       dashscope | ollama  (default: dashscope)
# embedding.provider: dashscope | ollama  (default: dashscope)
# vector.store:       inmemory  | chroma  (default: inmemory)
llm.provider=${LLM_PROVIDER:dashscope}
embedding.provider=${EMBEDDING_PROVIDER:dashscope}
vector.store=${VECTOR_STORE:inmemory}

# ── DashScope (Aliyun Bailian) ───────────────────────────────────────────────
# Set dashscope.api-key via env var DASHSCOPE_API_KEY or application-local.properties
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.model=${DASHSCOPE_MODEL:qwen-turbo}
dashscope.model.strong=${DASHSCOPE_MODEL_STRONG:qwen-plus}
dashscope.temperature=${DASHSCOPE_TEMPERATURE:0.7}
dashscope.embedding-model=${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}

# ── Ollama ───────────────────────────────────────────────────────────────────
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.chat-model=${OLLAMA_CHAT_MODEL:qwen3:4b}
ollama.embedding-model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
ollama.temperature=${OLLAMA_TEMPERATURE:0.7}
ollama.timeout=${OLLAMA_TIMEOUT:60}

# ── Chroma vector store ──────────────────────────────────────────────────────
# Start Chroma: chroma run --host 0.0.0.0 --port 8000 --path ./chroma-data
chroma.base-url=${CHROMA_BASE_URL:http://localhost:8000}
# Use different collection names per embedding provider to avoid mixing vector spaces
chroma.collection=${CHROMA_COLLECTION:rag-default}

# ── RAG configuration ────────────────────────────────────────────────────────
# rag.docs.dir = /path/to/your/docs  (set in application-local.properties)
rag.docs.dir=${RAG_DOCS_DIR:}
rag.chunk.maxChars=${RAG_CHUNK_MAX_CHARS:500}
rag.topK=${RAG_TOP_K:3}
rag.minScore=${RAG_MIN_SCORE:0.0}
rag.index.maxChunksPerFile=${RAG_INDEX_MAX_CHUNKS_PER_FILE:2000}
rag.index.batchSize=${RAG_INDEX_BATCH_SIZE:128}
rag.index.skipHugeFiles.enabled=${RAG_INDEX_SKIP_HUGE_FILES_ENABLED:true}

# ── RAG rerank (optional LLM-based reranking) ────────────────────────────────
rag.rerank.enabled=${RAG_RERANK_ENABLED:false}
rag.rerank.topN=${RAG_RERANK_TOP_N:2}

# ── Optional: Chroma / LangChain4j debug logging ────────────────────────────
# Uncomment to diagnose Chroma persistence issues:
# logging.level.dev.langchain4j.store.embedding.chroma=DEBUG
# logging.level.dev.langchain4j=DEBUG
