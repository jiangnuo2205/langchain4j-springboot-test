spring.application.name=springboot-langchain4j-dashscope
server.port=8090

# Set dashscope.api-key via env var DASHSCOPE_API_KEY or application-local.properties
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.model=${DASHSCOPE_MODEL:qwen-turbo}
dashscope.temperature=${DASHSCOPE_TEMPERATURE:0.7}
dashscope.embedding-model=${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v2}

# RAG configuration
# rag.docs.dir = /path/to/your/docs      (set in application-local.properties)
rag.docs.dir=${RAG_DOCS_DIR:}
rag.chunk.maxChars=${RAG_CHUNK_MAX_CHARS:500}
rag.topK=${RAG_TOP_K:3}
